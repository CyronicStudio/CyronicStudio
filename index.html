<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Basic Website</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 0;
            padding: 0;
            background-color: #f4f4f4;
        }

        header {
            background-color: #333;
            color: white;
            padding: 1em 0;
            text-align: center;
        }

        nav ul {
            list-style: none;
            padding: 0;
        }

        nav ul li {
            display: inline;
            margin: 0 1em;
        }

        nav ul li a {
            color: white;
            text-decoration: none;
        }

        main {
            padding: 2em;
        }

        h1, h2 {
            color: #333;
        }

        section {
            margin-bottom: 2em;
        }

        button {
            padding: 0.5em 1em;
            background-color: #333;
            color: white;
            border: none;
            cursor: pointer;
        }

        button:hover {
            background-color: #555;
        }

        footer {
            background-color: #333;
            color: white;
            text-align: center;
            padding: 1em 0;
            position: absolute;
            bottom: 0;
            width: 100%;
        }
    </style>
</head>
<body>
    <header>
        <h1>Welcome to My Basic Website</h1>
        <nav>
            <ul>
                <li><a href="#">Home</a></li>
                <li><a href="#">About</a></li>
                <li><a href="#">Contact</a></li>
            </ul>
        </nav>
    </header>
    <main>
        <section>
            <h2>About This Site</h2>
            <p>This is a basic website created as an example. It includes HTML, CSS, and JavaScript.</p>
        </section>
        <section>
            <h2>Interactive Section</h2>
            <button id="myButton">Click Me</button>
            <p id="message"></p>
        </section>
    </main>
    <footer>
        <p>&copy; 2024 My Basic Website</p>
    </footer>
    <script>
        document.getElementById("myButton").addEventListener("click", function() {
            document.getElementById("message").textContent = "You clicked the button!";
        });
    </script>
</body>
</html>
